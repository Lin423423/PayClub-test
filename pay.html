<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>線上繳費 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"><script src="pc_auth.js"></script>
<style>
body{min-height:100vh;background:var(--bg);}
.pay-nav{background:var(--white);border-bottom:1px solid var(--border);padding:13px 28px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:0.86rem;font-weight:600;cursor:pointer;padding:7px 13px;border:1.5px solid var(--border);border-radius:8px;background:transparent;font-family:'Noto Sans TC',sans-serif;transition:all 0.15s;}
.back-btn:hover{border-color:var(--border2);background:var(--surface);}
.nav-logo{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.1rem;color:var(--accent);margin-left:auto;display:flex;align-items:center;gap:6px;}
.demo-banner{background:var(--orange-light);border:1px solid #fed7aa;border-radius:9px;padding:10px 16px;margin:16px 20px 0;font-size:0.83rem;color:var(--orange);text-align:center;font-weight:600;}
.pay-wrap{max-width:860px;margin:24px auto;padding:0 20px;}
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
.pay-info-card{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
.pay-info-header{background:var(--accent);padding:22px 26px;color:#fff;}
.pay-badge{display:inline-block;background:rgba(255,255,255,0.2);border-radius:100px;padding:4px 12px;font-size:0.72rem;font-weight:700;letter-spacing:0.06em;margin-bottom:10px;}
.pay-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:5px;line-height:1.2;}
.pay-desc{color:rgba(255,255,255,0.8);font-size:0.86rem;line-height:1.6;}
.pay-info-body{padding:22px 26px;}
.amount-display{text-align:center;padding:18px;background:var(--surface);border-radius:12px;margin-bottom:14px;}
.amount-label{font-size:0.72rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;}
.amount-value{font-family:'Plus Jakarta Sans',sans-serif;font-size:2.8rem;font-weight:800;color:var(--accent);letter-spacing:-0.04em;line-height:1;}
.deadline-tag{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:7px;font-size:0.8rem;color:var(--text2);}
.deadline-tag.urgent{color:var(--red);}
.info-rows{display:flex;flex-direction:column;gap:9px;}
.info-row{display:flex;justify-content:space-between;font-size:0.86rem;}
.info-row-label{color:var(--text2);}
.info-row-val{font-weight:600;}
.pay-form-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:26px;box-shadow:var(--shadow);}
.pay-form-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1rem;font-weight:800;margin-bottom:18px;}
.user-identity{display:flex;align-items:center;gap:10px;background:var(--accent-light);border:1px solid #c7d2fe;border-radius:10px;padding:12px 14px;margin-bottom:16px;}
.user-av{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;flex-shrink:0;}
.user-id-name{font-size:0.9rem;font-weight:700;color:var(--text);}
.user-id-email{font-size:0.75rem;color:var(--accent);}
.pay-methods{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
.pay-method{padding:14px 16px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.15s;}
.pay-method:hover{border-color:var(--accent);background:var(--accent-light);}
.pay-method.selected{border-color:var(--accent);background:var(--accent-light);}
.pay-method-icon{font-size:1.4rem;}
.pay-method-name{font-size:0.88rem;font-weight:600;flex:1;}
.submit-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:0.98rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;transition:all 0.15s;}
.submit-btn:hover{background:var(--accent-dark);}
.security-note{text-align:center;font-size:0.75rem;color:var(--text3);margin-top:9px;}
.not-found{text-align:center;padding:60px 20px;max-width:400px;margin:0 auto;}
.success-wrap{max-width:500px;margin:48px auto;padding:0 20px;text-align:center;display:none;}
.success-circle{width:76px;height:76px;border-radius:50%;background:var(--green-light);border:3px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 18px;animation:pop 0.4s cubic-bezier(0.16,1,0.3,1);}
@keyframes pop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.success-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.7rem;font-weight:800;margin-bottom:7px;}
.success-sub{color:var(--text2);font-size:0.9rem;line-height:1.6;margin-bottom:22px;}
.receipt-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:left;margin-bottom:18px;box-shadow:var(--shadow);}
.receipt-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.87rem;}
.receipt-row:last-child{border-bottom:none;}
.receipt-row span:last-child{font-weight:700;color:var(--green);}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:999;}
.loading-overlay.show{display:flex;}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:680px){.pay-grid{grid-template-columns:1fr;}.amount-value{font-size:2.2rem;}}
</style>
</head>
<body>
<nav class="pay-nav">
  <button class="back-btn" id="backBtn" onclick="goBack()">← 上一頁</button>
  <div class="nav-logo"><div style="width:7px;height:7px;background:var(--accent);border-radius:50%;"></div>PayClub</div>
</nav>

<div id="topBanner"></div>

<div id="mainContent">
  <div id="notFoundWrap" style="display:none">
    <div class="not-found">
      <div style="font-size:3rem;margin-bottom:14px">🔍</div>
      <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:1.2rem;font-weight:800;margin-bottom:8px;">找不到此活動</div>
      <div style="color:var(--text2);margin-bottom:20px">活動連結可能已過期或不存在</div>
      <button class="back-btn" onclick="goBack()">← 返回</button>
    </div>
  </div>
  <div class="pay-wrap" id="payWrap" style="display:none">
    <div class="pay-grid">
      <div class="pay-info-card">
        <div class="pay-info-header">
          <div class="pay-badge">🎓 社團收款</div>
          <div class="pay-title" id="payTitle">載入中...</div>
          <div class="pay-desc" id="payDesc"></div>
        </div>
        <div class="pay-info-body">
          <div class="amount-display">
            <div class="amount-label">應繳金額</div>
            <div class="amount-value" id="payAmount">$—</div>
            <div class="deadline-tag" id="deadlineTag">📅 —</div>
          </div>
          <div class="info-rows">
            <div class="info-row"><span class="info-row-label">支付方式</span><span class="info-row-val" id="methodsLabel">—</span></div>
            <div class="info-row"><span class="info-row-label">資料加密</span><span class="info-row-val" style="color:var(--green)">🔒 256-bit SSL</span></div>
          </div>
        </div>
      </div>
      <div class="pay-form-card">
        <div class="pay-form-title">填寫繳費資訊</div>
        <div id="userIdentitySection"></div>
        <div class="form-group">
          <label class="form-label">本次繳費金額</label>
          <input type="number" id="customPayAmount" class="form-input" placeholder="請輸入繳費金額" min="1" style="font-size:1.1rem;font-weight:600;color:var(--accent)" oninput="updatePayButton()">
          <div style="font-size:0.75rem;color:var(--text3);margin-top:4px">可自行輸入繳費金額，或使用預設應繳金額</div>
        </div>
        <div class="form-group">
          <label class="form-label">選擇支付方式</label>
          <div class="pay-methods" id="payMethods"></div>
        </div>
        <div class="form-group">
          <label class="form-label">繳費備註（選填）</label>
          <textarea id="payRemark" class="form-input" rows="2" placeholder="例：代繳，實際繳費人為王大衛" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitPayment();}"></textarea>
        </div>
        <button class="submit-btn" onclick="submitPayment()">立即繳費 <span id="payBtnAmt">$—</span></button>
        <div class="security-note">🔒 使用 256-bit SSL 加密，安全有保障</div>
      </div>
    </div>
  </div>
</div>

<div class="success-wrap" id="successWrap">
  <div class="success-circle">✓</div>
  <div class="success-title">繳費成功！</div>
  <div class="success-sub" id="successSub">繳費已完成！</div>
  <div class="receipt-card">
    <div style="font-size:0.72rem;font-weight:700;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;">繳費收據</div>
    <div class="receipt-row"><span>交易編號</span><span id="rcTxId">—</span></div>
    <div class="receipt-row"><span>活動名稱</span><span id="rcTitle">—</span></div>
    <div class="receipt-row"><span>繳費人</span><span id="rcName">—</span></div>
    <div class="receipt-row"><span>Email</span><span id="rcEmail">—</span></div>
    <div class="receipt-row"><span>金額</span><span id="rcAmount">—</span></div>
    <div class="receipt-row"><span>支付方式</span><span id="rcMethod">—</span></div>
    <div class="receipt-row"><span>備註</span><span id="rcRemark">—</span></div>
    <div class="receipt-row"><span>時間</span><span id="rcTime">—</span></div>
  </div>
  <button class="btn btn-primary" id="backToEventBtn" style="width:100%;justify-content:center">← 返回活動頁面</button>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div style="font-size:0.88rem;color:var(--text2)">處理付款中...</div>
</div>
<div class="toast" id="toast"></div>

<script>
const DEFAULT_METHODS=[{id:'linepay',icon:'💚',name:'LINE Pay'},{id:'jkopay',icon:'🔵',name:'街口支付'},{id:'credit',icon:'💳',name:'信用卡'},{id:'atm',icon:'🏧',name:'ATM 轉帳'}];
let selectedMethod='LINE Pay',foundEvent=null,ownerKey=null,personalAmt=0,isDemo=false;
const currentUser=PC_getUser();
const params=new URLSearchParams(location.search);
const eventId=params.get('event');

// Back button: go to event page if we know it, else history.back()
function goBack(){
  if(eventId)location.href='event.html?id='+eventId;
  else history.back();
}
document.getElementById('backToEventBtn').onclick=()=>{if(eventId)location.href='event.html?id='+eventId;else location.href='dashboard.html';};

if(!eventId){
  isDemo=true;
  document.getElementById('topBanner').innerHTML='<div class="demo-banner">🎮 繳費頁面範例 Demo — 實際使用時會顯示真實活動資訊</div>';
  foundEvent={id:'demo',title:'🎓 迎新活動費用（範例）',desc:'這是繳費頁面的範例展示。',amount:300,deadline:new Date(Date.now()+14*86400000).toISOString().split('T')[0],status:'active',members:[]};
  personalAmt=300;ownerKey=null;
  document.getElementById('payWrap').style.display='block';
  setupPage();
} else {
  const result=PC_findEventById(eventId);
  if(!result){document.getElementById('notFoundWrap').style.display='block';}
  else{
    foundEvent=result.event;ownerKey=result.ownerKey;
    // Get personal amount for this user
    if(currentUser){
      const myM=(foundEvent.members||[]).find(m=>m.email===currentUser.email);
      if(myM){
        const expectedAmt = PC_getExpectedAmount(foundEvent, myM);
        const paidTotal = (myM.txHistory || []).reduce((sum, tx) => sum + (Number(tx.amount) || 0), 0);
        personalAmt = Math.max(0, expectedAmt - paidTotal);  // 剩餘待繳金額
      } else {
        personalAmt = Number(foundEvent.amount) || 0;
      }
    } else {
      personalAmt=Number(foundEvent.amount)||0;
    }
    document.getElementById('payWrap').style.display='block';
    setupPage();
  }
}

function setupPage(){
  document.getElementById('payTitle').textContent=foundEvent.title;
  document.getElementById('payDesc').textContent=foundEvent.desc||'請完成繳費，謝謝！';
  document.getElementById('payAmount').textContent='$'+personalAmt.toLocaleString();
  document.getElementById('payBtnAmt').textContent='$'+personalAmt.toLocaleString();
  
  // 設定自定義金額欄位預設值（有應繳金額才填入，否則留空）
  if(personalAmt > 0){
    document.getElementById('customPayAmount').value = personalAmt;
    document.getElementById('payBtnAmt').textContent = '$' + personalAmt.toLocaleString();
  } else {
    document.getElementById('customPayAmount').value = '';
    document.getElementById('payBtnAmt').textContent = '請輸入金額';
  }
  
  const dl=new Date(foundEvent.deadline),days=Math.ceil((dl-new Date())/86400000);
  const dtag=document.getElementById('deadlineTag');
  dtag.textContent='📅 截止：'+foundEvent.deadline+'（剩 '+Math.max(0,days)+' 天）';
  if(days<=3)dtag.classList.add('urgent');

  // User identity
  const idSec=document.getElementById('userIdentitySection');
  if(currentUser){
    idSec.innerHTML=`<div class="user-identity">
      <div class="user-av">${currentUser.name.slice(0,1)}</div>
      <div style="flex:1"><div class="user-id-name">${currentUser.name}</div><div class="user-id-email">${currentUser.email}</div></div>
      <span class="badge badge-green" style="font-size:0.68rem">已登入</span>
    </div>`;
  } else {
    idSec.innerHTML=`
      <div style="background:var(--orange-light);border-radius:9px;padding:10px 14px;margin-bottom:12px;font-size:0.8rem;color:var(--orange);">⚠️ 未登入繳費將無法自動對應帳號，建議先<a href="login.html?next=${encodeURIComponent(location.href)}" style="color:var(--accent);font-weight:700">登入</a>。</div>
      <div class="form-group"><label class="form-label">姓名 *</label><input type="text" id="guestName" class="form-input" placeholder="林小明"></div>
      <div class="form-group"><label class="form-label">Email *</label><input type="email" id="guestEmail" class="form-input" placeholder="your@email.com"></div>`;
  }

  // Payment methods — 根據活動設定的方式過濾
  let methods=DEFAULT_METHODS;
  if(ownerKey){
    const ownerEmail=ownerKey.replace('pc_events__','');
    const saved=localStorage.getItem('pc_pay_methods__'+ownerEmail);
    if(saved){
      const parsed=JSON.parse(saved);
      const active=parsed.filter(m=>m.active);
      if(active.length)methods=active;
    }
  }
  
  // 繳費方式過濾：
  // - paymentMethods === undefined → 從未設定，擋住
  // - paymentMethods === [] → 明確設定為空，擋住
  // - paymentMethods 有內容 → 只顯示選取的
  if(!foundEvent.paymentMethods || foundEvent.paymentMethods.length === 0){
    methods = [];
  } else {
    methods = methods.filter(m => foundEvent.paymentMethods.includes(m.id));
  }

  if(methods.length === 0){
    document.getElementById('payMethods').innerHTML = `
      <div style="background:var(--orange-light);border:1px solid #fed7aa;border-radius:10px;padding:14px 16px;font-size:0.86rem;color:var(--orange);text-align:center;">
        ⚠️ 此活動尚未設定可用的繳費方式，請聯繫活動管理員。
      </div>`;
    document.getElementById('methodsLabel').textContent = '尚未設定';
    // 禁用繳費按鈕
    const btn = document.querySelector('.submit-btn');
    if(btn){ btn.disabled=true; btn.style.opacity='0.4'; btn.style.cursor='not-allowed'; }
    selectedMethod = '';
    return;
  }
  
  // 渲染為一行一個
  document.getElementById('payMethods').innerHTML=methods.map((m,i)=>`
    <div class="pay-method${i===0?' selected':''}" onclick="selectMethod(this,'${m.name}')">
      <div class="pay-method-icon">${m.icon}</div>
      <div class="pay-method-name">${m.name}</div>
    </div>
  `).join('');
  document.getElementById('methodsLabel').textContent=methods.map(m=>m.name).join(' · ');
  selectedMethod=methods[0]?.name||'LINE Pay';
}

function selectMethod(el,m){document.querySelectorAll('.pay-method').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');selectedMethod=m;}

function updatePayButton(){
  const val = document.getElementById('customPayAmount').value;
  const customAmt = parseFloat(val);
  if(!val || isNaN(customAmt) || customAmt <= 0){
    document.getElementById('payBtnAmt').textContent = '請輸入金額';
  } else {
    document.getElementById('payBtnAmt').textContent = '$' + customAmt.toLocaleString();
  }
}

function submitPayment(){
  if(isDemo){PC_toast('🎮 Demo 模式，不實際處理付款');return;}
  
  // 取得自定義繳費金額
  const rawVal = document.getElementById('customPayAmount').value;
  const actualPayAmount = parseFloat(rawVal);
  if(!rawVal || isNaN(actualPayAmount) || actualPayAmount <= 0){
    PC_toast('❌ 請輸入大於 0 的繳費金額');
    document.getElementById('customPayAmount').focus();
    return;
  }
  
  let payerName,payerEmail;
  if(currentUser){payerName=currentUser.name;payerEmail=currentUser.email;}
  else{
    payerName=(document.getElementById('guestName')||{}).value?.trim();
    payerEmail=(document.getElementById('guestEmail')||{}).value?.trim();
    if(!payerName||!payerEmail||!payerEmail.includes('@')){PC_toast('請填寫姓名與 Email');return;}
  }
  const remark=document.getElementById('payRemark').value.trim();
  document.getElementById('loadingOverlay').classList.add('show');
  setTimeout(()=>{
    document.getElementById('loadingOverlay').classList.remove('show');
    const txId=PC_genTxId(),now=PC_nowStr();
    if(ownerKey){
      const evts=JSON.parse(localStorage.getItem(ownerKey)||'[]');
      const e=evts.find(x=>x.id===eventId);
      if(e){
        if(!e.members)e.members=[];
        let m=e.members.find(x=>x.email===payerEmail);
        if(m){
          // 現有成員繳費
          if(!m.txHistory)m.txHistory=[];
          m.txHistory.push({
            txId,
            amount: actualPayAmount,  // 使用自定義繳費金額
            time: now,
            method: selectedMethod,
            remark: remark
          });
          // 檢查是否繳清
          const expectedAmt = m.customAmount !== null && m.customAmount !== undefined ? m.customAmount : (e.amount || 0);
          const paidTotal = m.txHistory.reduce((sum, tx) => sum + (Number(tx.amount) || 0), 0);
          m.status = paidTotal >= expectedAmt ? 'paid' : 'pending';
          if(!m.paidAt)m.paidAt=now;
          if(!m.txId)m.txId=txId;
          m.payMethod=selectedMethod;
        }
        else{
          m=e.members.find(x=>x.name===payerName&&!x.email);
          if(m){
            // 補充 Email 並繳費
            m.email=payerEmail;
            if(!m.txHistory)m.txHistory=[];
            m.txHistory.push({txId, amount: actualPayAmount, time: now, method: selectedMethod, remark: remark});
            const expectedAmt = m.customAmount !== null && m.customAmount !== undefined ? m.customAmount : (e.amount || 0);
            const paidTotal = m.txHistory.reduce((sum, tx) => sum + (Number(tx.amount) || 0), 0);
            m.status = paidTotal >= expectedAmt ? 'paid' : 'pending';
            if(!m.paidAt)m.paidAt=now;
            if(!m.txId)m.txId=txId;
            m.payMethod=selectedMethod;
          }
          else{
            // 新成員
            e.members.push({
              name:payerName,
              email:payerEmail,
              roles:['payer'],
              role:'payer',
              status:'paid',
              paidAt:now,
              txId,
              payMethod:selectedMethod,
              customAmount:null,
              txHistory:[{txId, amount: actualPayAmount, time: now, method: selectedMethod, remark: remark}]
            });
          }
        }
        localStorage.setItem(ownerKey,JSON.stringify(evts));
        // Notify event owner
        const ownerEmail=ownerKey.replace('pc_events__','');
        PC_sendNotify(ownerEmail,'收到繳費通知 💰',`${payerName}(${payerEmail}) 已繳費「${foundEvent.title}」$${actualPayAmount.toLocaleString()}，方式：${selectedMethod}，交易編號：${txId}。`,'success');
      }
    }
    document.getElementById('rcTxId').textContent=txId;
    document.getElementById('rcTitle').textContent=foundEvent.title;
    document.getElementById('rcName').textContent=payerName;
    document.getElementById('rcEmail').textContent=payerEmail;
    document.getElementById('rcAmount').textContent='$'+actualPayAmount.toLocaleString();
    document.getElementById('rcMethod').textContent=selectedMethod;
    document.getElementById('rcRemark').textContent=remark||'—';
    document.getElementById('rcTime').textContent=new Date().toLocaleString('zh-TW');
    document.getElementById('successSub').textContent=payerName+'，繳費已完成！幹部將會收到通知。';
    document.getElementById('mainContent').style.display='none';
    document.getElementById('successWrap').style.display='block';
  },1800);
}
</script>
</body></html>
